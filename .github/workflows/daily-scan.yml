name: Daily GovCon Monitor

on:
  schedule:
    - cron: '0 11 * * *'    # 6 AM ET (11:00 UTC)
  workflow_dispatch:          # manual trigger for testing

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Setup Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > config/google_credentials.json

      - uses: actions/cache@v4
        with:
          path: data/cache/last_opportunities.json
          key: sam-state-${{ github.run_number }}
          restore-keys: sam-state-

      - name: Run daily monitor
        run: python scrapers/daily_monitor.py --score --push-to-sheet --max-pages 3
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          GOOGLE_SHEETS_CREDENTIALS_PATH: config/google_credentials.json
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monitor-output-${{ github.run_number }}
          path: data/
          retention-days: 30
